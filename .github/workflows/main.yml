name: Flutter Build (Unity 6 Final Fix)

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Устанавливаем NDK версии 28, как просит лог
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r28
          add-to-path: true

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get
        working-directory: example

      # Создаем файл настроек и прописываем путь к NDK вручную
      - name: Configure NDK path
        run: |
          echo "ndk.dir=${{ steps.setup-ndk.outputs.ndk-path }}" >> example/android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> example/android/local.properties

      - name: Build APK
        run: flutter build apk --release --target-platform android-arm64
        working-directory: example
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: example/build/app/outputs/flutter-apk/app-release.apk