name: Flutter Build (Unity 6 Final Fix)

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest 

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get
        working-directory: example

      # Используем встроенный в GitHub Actions NDK
      - name: Configure NDK path
        shell: pwsh
        run: |
          $ndkPath = "$env:ANDROID_SDK_ROOT/ndk/27.0.12077973".Replace('\', '/')
          "ndk.dir=$ndkPath" | Out-File -FilePath example/android/local.properties -Encoding utf8
          "sdk.dir=$($env:ANDROID_SDK_ROOT.Replace('\', '/'))" | Out-File -FilePath example/android/local.properties -Append -Encoding utf8

      - name: Build APK
        run: flutter build apk --release --target-platform android-arm64
        working-directory: example
        env:
          # Указываем путь к встроенному NDK для Flutter
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}\ndk\27.0.12077973

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: example/build/app/outputs/flutter-apk/app-release.apk
