name: Flutter Build (Unity 6 Final Fix)

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest 

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: 27.2.12479018 # Берем цифру прямо из таблицы в доках
          add-to-path: true

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get
        working-directory: example

      # Исправленный блок для Windows (используем PowerShell)
      - name: Configure NDK path
        shell: pwsh
        run: |
          $ndkPath = "${{ steps.setup-ndk.outputs.ndk-path }}".Replace('\', '/')
          "ndk.dir=$ndkPath" | Out-File -FilePath example/android/local.properties -Encoding utf8
          "sdk.dir=$($env:ANDROID_SDK_ROOT.Replace('\', '/'))" | Out-File -FilePath example/android/local.properties -Append -Encoding utf8

      - name: Build APK
        run: flutter build apk --release --target-platform android-arm64
        working-directory: example
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: example/build/app/outputs/flutter-apk/app-release.apk