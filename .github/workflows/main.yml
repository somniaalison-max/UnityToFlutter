name: Flutter Build (Unity 6 Fix)

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest 

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Используем официальный способ установки через Android SDK Manager
      - name: Install NDK 27.2.12479018
        shell: pwsh
        run: |
          & $env:ANDROID_SDK_ROOT\cmdline-tools\latest\bin\sdkmanager.bat "ndk;27.2.12479018"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get
        working-directory: example

      - name: Configure NDK path
        shell: pwsh
        run: |
          $ndkPath = "$env:ANDROID_SDK_ROOT/ndk/27.2.12479018".Replace('\', '/')
          "ndk.dir=$ndkPath" | Out-File -FilePath example/android/local.properties -Encoding utf8
          "sdk.dir=$($env:ANDROID_SDK_ROOT.Replace('\', '/'))" | Out-File -FilePath example/android/local.properties -Append -Encoding utf8

      - name: Build APK
        run: flutter build apk --release --target-platform android-arm64
        working-directory: example
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}\ndk\27.2.12479018

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: example/build/app/outputs/flutter-apk/app-release.apk
